# Cloudflare Tunnel 配置模板
# 文档: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
#
# 使用步骤:
#   1. 安装 cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. cloudflared tunnel login
#   3. cloudflared tunnel create diagram-api
#   4. 将下方 tunnel / credentials-file / hostname 替换为你的值
#   5. cloudflared tunnel route dns diagram-api api.yourdomain.com
#   6. cloudflared tunnel --config deploy/cloudflared-config.yml run diagram-api
#
# 后端 .env 建议:
#   APP_ENV=production
#   HOST=127.0.0.1
#   PORT=8765
#   BEHIND_CLOUDFLARE=1
#   TRUSTED_HOSTS=api.yourdomain.com
#   INTERNAL_API_SECRET=<随机长字符串>
#   CORS_ORIGINS=https://yourdomain.com

tunnel: diagram-api
credentials-file: /path/to/.cloudflared/<TUNNEL-UUID>.json

ingress:
  # API 子域名 → 本地 FastAPI
  - hostname: api.yourdomain.com
    service: http://127.0.0.1:8765
    originRequest:
      noTLSVerify: false
      connectTimeout: 30s
      httpHostHeader: api.yourdomain.com

  # 兜底：拒绝其他请求
  - service: http_status:404
