# 宝塔 → 网站 → 你的站点 → 设置 → 配置文件
# 将 server { ... } 块替换或合并为以下内容（域名改成你的）

server {
    listen 80;
    listen 443 ssl http2;
    server_name diagram.example.com;

    # SSL 证书路径由宝塔「SSL → Let's Encrypt」自动生成，勿手改
    # ssl_certificate    /www/server/panel/vhost/cert/diagram.example.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/diagram.example.com/privkey.pem;

    client_max_body_size 2m;

    # 前端静态 + SPA 回退
    root /www/wwwroot/diagram-generator/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # 静态资源长缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /www/wwwlogs/diagram.example.com.log;
    error_log  /www/wwwlogs/diagram.example.com.error.log;
}
